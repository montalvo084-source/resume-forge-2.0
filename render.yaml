services:
  - type: web
    name: resumeforge
    env: python
    pythonVersion: "3.12.4"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    disk:
      name: resumeforge-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
